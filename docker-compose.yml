# OPTIONAL — only for local Postgres. Cloud setup uses Supabase; Docker is not required for Vercel deploy.
services:
  postgres:
    image: postgres:16-alpine
    container_name: regnskap-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: regnskap
      POSTGRES_PASSWORD: regnskap_dev
      POSTGRES_DB: regnskap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regnskap -d regnskap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
